# High-frequency scalping config for ZEC, ETH, DASH, TAO, VIRTUAL
exchange:
  name: bybit
  base_url: https://api.bybit.com
  category: linear  # futures data
  testnet: false

symbols:
  - ZECUSDT
  - ETHUSDT
  - DASHUSDT
  - TAOUSDT
  - VIRTUALUSDT

timeframes:
  - 3

fetch:
  days: 28
  limit: 1000
  sleep_ms: 50

backtest:
  initial_capital: 1000
  position_size_pct: 0.10
  fee_rate: 0.0001  # 0.01% per side futures
  slippage: 0.0005
  max_positions: 2
  leverage: 5  # lower leverage to avoid liquidation on altcoins

risk:
  daily_loss_limit: 0.50
  max_drawdown: 0.80
  stop_loss: 0.01
  take_profit: 0.02
  use_atr_sl_tp: true
  atr_multiplier_sl: 2.5
  atr_multiplier_tp: 5.0
  max_hold_bars: 15

strategies:
  - ml_momentum

output:
  reports_dir: reports
