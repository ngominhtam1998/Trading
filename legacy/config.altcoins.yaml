# Altcoin scalping config: 1 week, high-frequency
exchange:
  name: bybit
  base_url: https://api.bybit.com
  testnet: false

symbols:
  - ETHUSDT
  - SOLUSDT
  - VIRTUALUSDT
  - DOGEUSDT
  - LINKUSDT
  - ARBUSDT

timeframes:
  - 1
  - 3
  - 5

fetch:
  days: 7
  limit: 1000
  sleep_ms: 50

backtest:
  initial_capital: 10000
  position_size_pct: 0.20  # 20% capital per trade -> high exposure
  fee_rate: 0.0001  # 0.01% per side for Bybit futures
  slippage: 0.0005
  max_positions: 3
  leverage: 20  # 20x leverage, sweet spot for this strategy

risk:
  daily_loss_limit: 0.50
  max_drawdown: 0.80
  stop_loss: 0.01
  take_profit: 0.02
  use_atr_sl_tp: true
  atr_multiplier_sl: 1.0
  atr_multiplier_tp: 2.0
  max_hold_bars: 20

strategies:
  - volatility_breakout

output:
  reports_dir: reports
